<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>BVEX AI SOHBET</title>
    <style>
        body { background: #000; color: #00d4ff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .main-btn { width: 150px; height: 150px; border-radius: 50%; border: 4px solid #00d4ff; background: none; color: #00d4ff; font-size: 20px; cursor: pointer; box-shadow: 0 0 20px #00d4ff; transition: 0.3s; }
        .main-btn:active { transform: scale(0.9); background: #333; }
        #info { margin-top: 30px; font-weight: bold; text-align: center; }
        #ai-text { color: #fff; margin-top: 20px; max-width: 80%; font-style: italic; }
    </style>
</head>
<body>

    <button id="talkBtn" class="main-btn">BAŞLAT</button>
    <div id="info">BUTONA BAS VE KONUŞ</div>
    <div id="ai-text"></div>

    <script>
        const API_KEY = "AIzaSyDAgBwQlaHelDVrkfqihKGVS0bVsjjN0H0";
        const btn = document.getElementById('talkBtn');
        const info = document.getElementById('info');
        const aiText = document.getElementById('ai-text');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) {
            info.innerText = "HATA: TARAYICIN SESİ DESTEKLEMİYOR";
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'tr-TR';

            btn.onclick = () => {
                recognition.start();
                info.innerText = "DİNLİYORUM... (KONUŞUN)";
                btn.style.borderColor = "#ff0055";
            };

            recognition.onresult = async (event) => {
                const query = event.results[0][0].transcript;
                info.innerText = "DÜŞÜNÜYORUM...";
                
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ contents: [{ parts: [{ text: query }] }] })
                    });
                    const data = await response.json();
                    const reply = data.candidates[0].content.parts[0].text;
                    
                    aiText.innerText = "BEX: " + reply;
                    speak(reply);
                } catch (e) {
                    info.innerText = "API HATASI OLUŞTU!";
                }
            };

            recognition.onerror = (e) => {
                info.innerText = "HATA: " + e.error.toUpperCase();
                if(e.error === 'not-allowed') {
                    alert("Mikrofon izni verilmedi! Lütfen tarayıcı ayarlarından mikrofonu açın.");
                }
                btn.style.borderColor = "#00d4ff";
            };
        }

        function speak(text) {
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(text.replace(/[*#]/g, ''));
            utter.lang = 'tr-TR';
            utter.onstart = () => { info.innerText = "BVEX KONUŞUYOR..."; };
            utter.onend = () => { 
                info.innerText = "TEKRAR SORMAK İÇİN BAS"; 
                btn.style.borderColor = "#00d4ff";
            };
            synth.speak(utter);
        }
    </script>
</body>
</html>
