<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BVEX AI ASİSTAN | Sesli & Yazılı Sohbet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0a2a, #000000);
            color: #00f2ff;
            font-family: 'Segoe UI', 'Poppins', 'Orbitron', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Ana Kart */
        .container {
            width: 100%;
            max-width: 700px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            border: 1px solid rgba(0, 212, 255, 0.4);
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.3), inset 0 0 20px rgba(0,212,255,0.1);
            padding: 25px 20px 35px;
            transition: all 0.3s;
        }

        /* Başlık */
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 2.2rem;
            letter-spacing: 3px;
            text-shadow: 0 0 8px #00d4ff;
            background: linear-gradient(135deg, #00d4ff, #a0f0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .badge {
            font-size: 0.75rem;
            background: #00d4ff20;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            border: 1px solid #00d4ff;
            margin-top: 8px;
        }

        /* Sohbet Kutusu */
        .chat-area {
            background: #00000055;
            border-radius: 32px;
            padding: 20px;
            min-height: 280px;
            max-height: 380px;
            overflow-y: auto;
            margin-bottom: 20px;
            border: 1px solid #00d4ff30;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }
        .message {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }
        .user-msg {
            align-items: flex-end;
        }
        .ai-msg {
            align-items: flex-start;
        }
        .bubble {
            max-width: 85%;
            padding: 12px 18px;
            border-radius: 26px;
            font-size: 1rem;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .user-bubble {
            background: linear-gradient(135deg, #00d4ff30, #0077aa30);
            border: 1px solid #00d4ff;
            color: #eef5ff;
            border-bottom-right-radius: 6px;
        }
        .ai-bubble {
            background: #0a1a2ae0;
            border: 1px solid #00d4ff80;
            color: #c0f0ff;
            border-bottom-left-radius: 6px;
        }
        .msg-label {
            font-size: 0.7rem;
            margin-bottom: 4px;
            margin-left: 8px;
            margin-right: 8px;
            opacity: 0.7;
            letter-spacing: 1px;
        }

        /* Kontrol butonları */
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .action-btn {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #00d4ff;
            color: #00d4ff;
            font-size: 1rem;
            padding: 12px 20px;
            border-radius: 60px;
            cursor: pointer;
            font-weight: bold;
            backdrop-filter: blur(5px);
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-family: monospace;
        }
        .action-btn:active { transform: scale(0.96); }
        .action-btn:hover { background: #00d4ff20; box-shadow: 0 0 12px #00d4ff; }
        .mic-btn {
            background: #00d4ff20;
            border-color: #00ffff;
            box-shadow: 0 0 8px #00d4ff;
        }
        .listening {
            animation: pulse 1.2s infinite;
            background: #ff005530;
            border-color: #ff66cc;
            box-shadow: 0 0 20px #ff66cc;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1;}
            50% { transform: scale(1.05); opacity: 0.9;}
            100% { transform: scale(1);}
        }

        /* Metin giriş alanı */
        .input-area {
            display: flex;
            gap: 12px;
            background: #000000aa;
            border-radius: 60px;
            padding: 5px;
            border: 1px solid #00d4ff60;
        }
        #textInput {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 18px;
            color: #00f2ff;
            font-size: 1rem;
            outline: none;
            font-family: monospace;
        }
        #textInput::placeholder { color: #00d4ff80; }
        .send-btn {
            background: #00d4ff30;
            border: none;
            border-radius: 50px;
            padding: 0 22px;
            color: #00d4ff;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .status {
            text-align: center;
            margin-top: 15px;
            font-size: 0.8rem;
            color: #aaffff;
            text-shadow: 0 0 4px black;
        }
        .clear-btn {
            background: none;
            border: 1px solid #ff3366;
            color: #ff88aa;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            cursor: pointer;
            margin-left: 10px;
        }
        .footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 18px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>⚡ BVEX AI ⚡</h1>
        <div class="badge">🎙️ Sesli + Yazılı | Gemini 1.5 Flash</div>
    </div>

    <!-- Sohbet geçmişi -->
    <div class="chat-area" id="chatArea">
        <div class="message ai-msg">
            <div class="msg-label">🤖 BVEX AI</div>
            <div class="bubble ai-bubble">Merhaba! Ben BVEX. Sesli komut için mikrofon butonuna bas ya da yazı yaz. Sana nasıl yardımcı olabilirim? 🔮</div>
        </div>
    </div>

    <!-- Butonlar -->
    <div class="controls">
        <button id="micBtn" class="action-btn mic-btn">🎤 SESLİ KONUŞ</button>
        <button id="stopSpeechBtn" class="action-btn">🔇 SİNDİR KONUŞMA</button>
        <button id="clearChatBtn" class="action-btn clear-btn" style="background:#000;">🗑️ TEMİZLE</button>
    </div>

    <!-- Yazı ile gönderme -->
    <div class="input-area">
        <input type="text" id="textInput" placeholder="Mesajını yaz... (Enter ile gönder)" autocomplete="off">
        <button id="sendTextBtn" class="send-btn">GÖNDER ✨</button>
    </div>

    <div id="statusMsg" class="status">✅ Hazır | Butona bas veya yaz</div>
    <div class="footer">🎧 BVEX AI - Yapay Zeka Asistanı | Ses tanıma + sentez</div>
</div>

<script>
    // ---------- KONFİG ----------
    const API_KEY = "AIzaSyAYDRqZEaPk5DMmPu57EWN04g4orvQ8BBo";
    const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
    
    // DOM elementleri
    const micBtn = document.getElementById('micBtn');
    const stopSpeechBtn = document.getElementById('stopSpeechBtn');
    const clearChatBtn = document.getElementById('clearChatBtn');
    const textInput = document.getElementById('textInput');
    const sendTextBtn = document.getElementById('sendTextBtn');
    const chatArea = document.getElementById('chatArea');
    const statusDiv = document.getElementById('statusMsg');

    // Ses sentezi kontrolü
    let currentUtterance = null;
    let isSpeaking = false;

    // Konuşma tanıma
    let recognition = null;
    let isListening = false;
    const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;

    // ---------- YARDIMCI FONKSİYONLAR ----------
    function updateStatus(text, isError = false) {
        statusDiv.innerHTML = text;
        statusDiv.style.color = isError ? "#ff8888" : "#aaffff";
        setTimeout(() => {
            if (!isError) statusDiv.style.color = "#aaffff";
        }, 2000);
    }

    // Sohbete mesaj ekle (kullanıcı / AI)
    function addMessage(text, isUser = true) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${isUser ? 'user-msg' : 'ai-msg'}`;
        const label = document.createElement('div');
        label.className = 'msg-label';
        label.innerText = isUser ? '👤 SEN' : '🤖 BVEX AI';
        const bubble = document.createElement('div');
        bubble.className = `bubble ${isUser ? 'user-bubble' : 'ai-bubble'}`;
        bubble.innerText = text;
        msgDiv.appendChild(label);
        msgDiv.appendChild(bubble);
        chatArea.appendChild(msgDiv);
        // Otomatik kaydırma
        chatArea.scrollTop = chatArea.scrollHeight;
        return msgDiv;
    }

    // Sohbeti temizle (ilk mesajı koru)
    function clearChat() {
        chatArea.innerHTML = '';
        addMessage("Merhaba! Ben BVEX. Sesli komut için mikrofon butonuna bas ya da yazı yaz. Sana nasıl yardımcı olabilirim? 🔮", false);
        updateStatus("🧹 Sohbet temizlendi.");
    }

    // Gemini AI çağrısı
    async function getGeminiResponse(prompt) {
        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { temperature: 0.8, maxOutputTokens: 600 }
                })
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            if (data.candidates && data.candidates[0]?.content?.parts[0]?.text) {
                return data.candidates[0].content.parts[0].text;
            } else {
                return "BVEX: Yanıt üretirken bir tuhaflık oldu, tekrar dener misin?";
            }
        } catch (err) {
            console.error(err);
            return "⚠️ Bağlantı hatası! API'ye ulaşılamıyor. Lütfen internetini kontrol et.";
        }
    }

    // Sesli yanıt verme (konuşma)
    function speakText(text) {
        if (currentUtterance) {
            window.speechSynthesis.cancel();
            currentUtterance = null;
        }
        // Metin temizliği (işaretleri kaldır)
        const cleanText = text.replace(/[*#_`]/g, '').replace(/\n/g, ' ');
        const utterance = new SpeechSynthesisUtterance(cleanText);
        utterance.lang = 'tr-TR';
        utterance.rate = 1.0;
        utterance.pitch = 1.1;
        
        utterance.onstart = () => {
            isSpeaking = true;
            updateStatus("🔊 BVEX konuşuyor...");
            micBtn.disabled = true;
            micBtn.style.opacity = "0.6";
        };
        utterance.onend = () => {
            isSpeaking = false;
            updateStatus("✅ Hazır | Sesli ya da yazılı sorabilirsin");
            micBtn.disabled = false;
            micBtn.style.opacity = "1";
            currentUtterance = null;
        };
        utterance.onerror = () => {
            isSpeaking = false;
            micBtn.disabled = false;
            micBtn.style.opacity = "1";
            updateStatus("⚠️ Ses sentezleme hatası", true);
        };
        currentUtterance = utterance;
        window.speechSynthesis.speak(utterance);
    }

    // Konuşmayı durdur
    function stopSpeaking() {
        if (window.speechSynthesis.speaking || currentUtterance) {
            window.speechSynthesis.cancel();
            currentUtterance = null;
            isSpeaking = false;
            micBtn.disabled = false;
            micBtn.style.opacity = "1";
            updateStatus("⏹️ Konuşma durduruldu.");
        }
    }

    // KULLANICI SORGUSUNU İŞLE (metin veya sesli)
    async function processUserQuery(userText) {
        if (!userText || userText.trim() === "") return;
        // Kullanıcı mesajını ekrana ekle
        addMessage(userText, true);
        updateStatus("🧠 BVEX düşünüyor...");
        
        try {
            const aiReply = await getGeminiResponse(userText);
            // AI cevabını göster
            addMessage(aiReply, false);
            updateStatus("🗣️ Yanıt alındı, seslendiriliyor...");
            // Sesli yanıt ver
            speakText(aiReply);
        } catch (err) {
            updateStatus("❌ API hatası: " + err.message, true);
            addMessage("Üzgünüm, teknik bir aksaklık oldu. Lütfen tekrar dene.", false);
        }
    }

    // ---------- SESLİ TANIMA (MİKROFON) ----------
    function initSpeechRecognition() {
        if (!SpeechRecognitionAPI) {
            updateStatus("❌ Tarayıcınız Ses Tanıma desteklemiyor!", true);
            micBtn.disabled = true;
            return null;
        }
        const recog = new SpeechRecognitionAPI();
        recog.lang = 'tr-TR';
        recog.continuous = false;
        recog.interimResults = false;
        recog.maxAlternatives = 1;

        recog.onstart = () => {
            isListening = true;
            micBtn.classList.add('listening');
            micBtn.innerHTML = "🎙️ DİNLİYORUM...";
            updateStatus("🎤 Konuşun, sizi dinliyorum... (sessiz olursa otomatik biter)");
        };
        recog.onend = () => {
            isListening = false;
            micBtn.classList.remove('listening');
            micBtn.innerHTML = "🎤 SESLİ KONUŞ";
            if (!currentUtterance || !window.speechSynthesis.speaking) {
                updateStatus("✅ Dinleme sona erdi, soru sormaya hazır.");
            }
        };
        recog.onerror = (event) => {
            isListening = false;
            micBtn.classList.remove('listening');
            micBtn.innerHTML = "🎤 SESLİ KONUŞ";
            if (event.error === 'not-allowed') {
                updateStatus("🔇 Mikrofon izni verilmedi! Ayarlardan izin verin.", true);
                alert("Mikrofon erişimi engellendi. Lütfen tarayıcı ayarlarından mikrofon iznini aktifleştirin.");
            } else if (event.error === 'no-speech') {
                updateStatus("🤐 Konuşma algılanmadı, tekrar dene.", true);
            } else {
                updateStatus(`Hata: ${event.error}`, true);
            }
        };
        recog.onresult = async (event) => {
            const transcript = event.results[0][0].transcript;
            updateStatus(`📝 Anlaşıldı: "${transcript}" → Yanıt hazırlanıyor...`);
            // ses tanıma bittiğinde otomatik sorguyu işle
            await processUserQuery(transcript);
        };
        return recog;
    }

    // Mikrofon başlatma / durdurma
    function startListening() {
        if (isSpeaking) {
            updateStatus("Şu anda BVEX konuşuyor, biraz bekleyin veya konuşmayı durdurun.", true);
            return;
        }
        if (isListening) {
            // Zaten dinliyorsa durdur
            if (recognition) recognition.stop();
            return;
        }
        if (!recognition) {
            recognition = initSpeechRecognition();
            if (!recognition) return;
        }
        try {
            recognition.start();
        } catch (e) {
            if (e.name === 'InvalidStateError') {
                // bazen zaten başlamış olabilir
                recognition.stop();
                setTimeout(() => recognition.start(), 200);
            } else {
                updateStatus("Mikrofon başlatılamadı: " + e.message, true);
            }
        }
    }

    // ---------- YAZILI SORU ----------
    function onSendText() {
        const msg = textInput.value.trim();
        if (msg === "") {
            updateStatus("Lütfen bir şey yazın.", true);
            return;
        }
        textInput.value = "";
        processUserQuery(msg);
    }

    // ---------- EVENTLER ----------
    micBtn.onclick = () => {
        if (isSpeaking) {
            stopSpeaking();
            setTimeout(() => startListening(), 200);
        } else {
            startListening();
        }
    };
    
    stopSpeechBtn.onclick = () => {
        stopSpeaking();
        if (isListening && recognition) {
            recognition.stop();
        }
        updateStatus("🔇 Ses çıkışı ve dinleme durduruldu.");
    };
    
    clearChatBtn.onclick = () => {
        clearChat();
        stopSpeaking();
        if (isListening && recognition) recognition.stop();
    };
    
    sendTextBtn.onclick = onSendText;
    textInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            onSendText();
        }
    });

    // Sayfa yüklenince speech recognition objesini hazırla
    if (SpeechRecognitionAPI) {
        recognition = initSpeechRecognition();
    } else {
        micBtn.disabled = true;
        updateStatus("❌ Tarayıcı Ses Tanıma desteklemiyor, lütfen yazı ile devam edin.", true);
    }

    // Konuşma sentezi için sayfa kapanınca durdur
    window.addEventListener('beforeunload', () => {
        if (window.speechSynthesis) window.speechSynthesis.cancel();
    });
</script>
</body>
            </html>
