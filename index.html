<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BVEX AI - Hands Free</title>
    <style>
        body { margin: 0; background: #0a0a0a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .orb { width: 200px; height: 200px; background: radial-gradient(circle, #00d4ff 0%, #0055ff 100%); border-radius: 50%; filter: blur(20px); transition: all 0.5s ease; position: relative; }
        .orb.active { transform: scale(1.2); filter: blur(10px); box-shadow: 0 0 50px #00d4ff; animation: pulse 1s infinite alternate; }
        #status { margin-top: 30px; font-size: 1.5rem; text-align: center; color: #00d4ff; font-weight: bold; }
        @keyframes pulse { from { opacity: 0.6; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="orb" id="visualizer"></div>
    <div id="status">"Hey Bex" diyerek uyandır...</div>

    <script>
        const API_KEY = "AIzaSyDAgBwQlaHelDVrkfqihKGVS0bVsjjN0H0";
        const statusDisplay = document.getElementById('status');
        const visualizer = document.getElementById('visualizer');
        const synth = window.speechSynthesis;
        
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();

        recognition.lang = 'tr-TR';
        recognition.continuous = true; // Sürekli dinleme modu
        recognition.interimResults = false;

        // Başlatma
        window.onload = () => {
            recognition.start();
            statusDisplay.innerText = "BVEX AI Aktif. 'Hey Bex' demeni bekliyorum...";
        };

        // Bağlantı kopsa bile tekrar başlat (Sürekli dinleme için kritik)
        recognition.onend = () => { recognition.start(); };

        recognition.onresult = async (event) => {
            const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
            console.log("Algılanan:", transcript);

            if (transcript.includes("hey bex")) {
                statusDisplay.innerText = "Seni dinliyorum...";
                visualizer.classList.add('active');
                
                // "Hey Bex" kısmını sil, geri kalan komutu Gemini'ye gönder
                const userQuery = transcript.replace("hey bex", "").trim();
                
                if (userQuery.length > 1) {
                    const reply = await getGeminiResponse(userQuery);
                    speak(reply);
                } else {
                    speak("Efendim?");
                }
            }
        };

        async function getGeminiResponse(text) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }]
                    })
                });
                const data = await response.json();
                return data.candidates[0].content.parts[0].text;
            } catch (error) {
                return "Bir hata oluştu, tekrar dener misin?";
            }
        }

        function speak(text) {
            // Yazıyı temizle (yıldızları vs. okumasın)
            const cleanText = text.replace(/[*#]/g, '');
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'tr-TR';
            
            utterance.onstart = () => {
                statusDisplay.innerText = "BVEX cevap veriyor...";
                visualizer.style.background = "radial-gradient(circle, #ff00ff 0%, #aa00ff 100%)";
            };

            utterance.onend = () => {
                statusDisplay.innerText = "Beklemede: 'Hey Bex'...";
                visualizer.classList.remove('active');
                visualizer.style.background = "radial-gradient(circle, #00d4ff 0%, #0055ff 100%)";
            };

            synth.speak(utterance);
        }
    </script>
</body>
</html>
