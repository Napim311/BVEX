<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>BVEX AI | Kesintisiz Ses</title>
    <style>
        body { margin: 0; background: radial-gradient(circle, #111, #000); color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .status-light { width: 20px; height: 20px; background: #ff0000; border-radius: 50%; margin-bottom: 10px; box-shadow: 0 0 10px #ff0000; }
        .active-light { background: #00ff00; box-shadow: 0 0 15px #00ff00; }
        #info { font-size: 1.2rem; letter-spacing: 1px; }
        #transcript { color: #555; margin-top: 20px; font-style: italic; }
    </style>
</head>
<body>

    <div class="status-light" id="light"></div>
    <div id="info">BVEX SİSTEMİ HAZIR</div>
    <div id="transcript">Ses bekleniyor...</div>

    <script>
        const API_KEY = "AIzaSyDAgBwQlaHelDVrkfqihKGVS0bVsjjN0H0";
        const light = document.getElementById('light');
        const info = document.getElementById('info');
        const transcriptDiv = document.getElementById('transcript');
        
        let recognition;
        let speaking = false;

        function startSystem() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'tr-TR';
            recognition.continuous = true;
            recognition.interimResults = false;

            recognition.onstart = () => {
                light.classList.add('active-light');
                info.innerText = "BVEX DİNLİYOR (HEY BEX)";
            };

            recognition.onresult = async (event) => {
                const lastResult = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
                transcriptDiv.innerText = "Duyulan: " + lastResult;

                if (lastResult.includes("hey bex") && !speaking) {
                    const command = lastResult.replace("heybex", "").trim();
                    askGemini(command || "merhaba");
                }
            };

            // Hata veya sessizlikte asla kapanma, hemen geri aç
            recognition.onend = () => { 
                if (!speaking) recognition.start(); 
            };

            recognition.onerror = () => {
                setTimeout(() => recognition.start(), 100);
            };

            recognition.start();
        }

        async function askGemini(text) {
            speaking = true;
            recognition.stop(); // Konuşurken dinlemeyi kes
            info.innerText = "BVEX DÜŞÜNÜYOR...";
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });
                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text;
                speak(aiResponse);
            } catch (err) {
                speak("Bir bağlantı hatası yaşadım.");
            }
        }

        function speak(text) {
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(text.replace(/[*#]/g, ''));
            utter.lang = 'tr-TR';
            
            utter.onstart = () => { info.innerText = "BVEX KONUŞUYOR..."; };
            utter.onend = () => {
                speaking = false;
                info.innerText = "BVEX DİNLİYOR (HEY BEX)";
                recognition.start(); // Konuşma bitince dinlemeyi aç
            };

            synth.speak(utter);
        }

        // SAYFA YÜKLENDİĞİNDE OTOMATİK BAŞLATMAYI DENE
        window.onload = startSystem;

        // Tarayıcı ilk başta engelleyebilir, bu yüzden bir kez ekrana dokunursan 
        // sistem kilitlenir ve bir daha dokunmana gerek kalmaz.
        window.onclick = () => {
            if (!recognition) startSystem();
        };
    </script>
</body>
</html>
